<!-- Nayara Gardens family landing :: paste into HubSpot landing-page Settings > Advanced options > 'Head HTML' -->
<link rel="preconnect" href="https://use.typekit.net" crossorigin>
<link rel="stylesheet" href="https://use.typekit.net/zft1qmm.css">
<style>
:root{
    
    --olive:#767342; --olive-2:#757342; --olive-deep:#3a3d22; --olive-ink:#2b2c1d;
    --cream:#edf2f2; --cream-2:#e3eaea; --ink:#2b2c1d; --ink-soft:rgba(43,44,29,.74); --ink-faint:rgba(43,44,29,.52);
    --gold:#e8a82c; --gold-soft:#e8a33d; --line:#d6dcdc; --white:#fff;
    --display:"minion-pro","Minion Pro",Georgia,"Times New Roman",serif;
    --body:"futura-pt","Futura PT","Century Gothic",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    --maxw:1200px; --gut:clamp(1.25rem,5vw,3.25rem);
  }
#ngl *{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
#ngl{font-family:var(--body);color:var(--ink);background:var(--cream);line-height:1.7;font-weight:400;-webkit-font-smoothing:antialiased;overflow-x:hidden}
#ngl img{display:block;max-width:100%;height:auto}
#ngl a{color:inherit}
#ngl .wrap{max-width:var(--maxw);margin:0 auto;padding-inline:var(--gut)}
#ngl section{padding:clamp(54px,9vw,118px) 0}
#ngl .eyebrow{font-family:var(--body);font-weight:600;font-size:.7rem;letter-spacing:.34em;text-transform:uppercase;color:var(--gold);margin:0 0 18px}
#ngl h1,#ngl h2,#ngl h3{font-family:var(--display);font-weight:400;line-height:1.08;color:var(--ink);letter-spacing:.02em}
#ngl h2{font-size:clamp(2rem,4.2vw,3.2rem);margin:0 0 20px}
#ngl h3{font-size:clamp(1.35rem,2.2vw,1.7rem);margin:0 0 8px}
#ngl .caps{text-transform:uppercase;letter-spacing:.12em}
#ngl p{font-size:1.02rem;color:var(--ink-soft)}
#ngl .lede{font-family:var(--display);font-size:clamp(1.5rem,2.8vw,2.1rem);line-height:1.35;color:var(--ink);font-weight:400}
#ngl .btn{display:inline-block;padding:15px 34px;border-radius:2px;font-family:var(--body);font-weight:600;font-size:.78rem;letter-spacing:.18em;text-transform:uppercase;text-decoration:none;transition:opacity .2s}
#ngl .btn-solid{background:var(--gold);color:var(--olive-ink)}
#ngl .btn-ghost{border:1px solid rgba(255,255,255,.7);color:var(--white)}
#ngl .btn-ghost-dark{border:1px solid var(--gold);color:var(--gold)}
#ngl .btn:hover{opacity:.85}
#ngl .hero{position:relative;min-height:94vh;display:flex;align-items:center;background:var(--olive)}
#ngl .hero .bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.42;mix-blend-mode:multiply}
#ngl .hero .tint{position:absolute;inset:0;background:linear-gradient(180deg,rgba(58,61,34,.25),rgba(58,61,34,.5))}
#ngl .hero .inner{position:relative;width:100%;display:flex;align-items:center;gap:30px;flex-wrap:wrap}
#ngl .hero .copy{color:var(--white);max-width:46rem}
#ngl .hero .eyebrow{color:rgba(255,255,255,.85)}
#ngl .hero h1{color:var(--white);font-size:clamp(2.6rem,6.4vw,5rem);text-transform:uppercase;letter-spacing:.06em;line-height:1.02;max-width:15ch}
#ngl .hero .sub{font-family:var(--display);font-style:italic;font-size:clamp(1.3rem,2.4vw,1.9rem);color:rgba(255,255,255,.92);margin:20px 0 30px;max-width:30ch}
#ngl .hero .cta-row{display:flex;gap:14px;flex-wrap:wrap}
#ngl .split{display:grid;grid-template-columns:1fr 1fr;gap:clamp(30px,5vw,76px);align-items:center}
@media(max-width:840px){#ngl .split{grid-template-columns:1fr}
}
#ngl .media img{border-radius:3px;box-shadow:0 30px 70px -34px rgba(43,44,29,.55);width:100%}
#ngl figcaption{margin-top:11px;font-size:.78rem;font-style:italic;color:var(--ink-faint)}
#ngl .mist{background:var(--cream-2)}
#ngl .center{text-align:center}
#ngl .center .eyebrow{display:block}
#ngl .center p{margin-inline:auto}
#ngl .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(20px,2.5vw,32px)}
@media(max-width:840px){#ngl .cards{grid-template-columns:1fr}
}
#ngl .card{background:var(--white);border:1px solid var(--line);border-radius:4px;overflow:hidden}
#ngl .card img{width:100%;aspect-ratio:4/3;object-fit:cover}
#ngl .card .cbody{padding:24px 24px 28px}
#ngl .card p{font-size:.95rem}
#ngl .day{background:var(--olive-deep);color:var(--white)}
#ngl .day h2,#ngl .day .lede{color:var(--white)}
#ngl .day .eyebrow{color:var(--gold-soft)}
#ngl .steps{display:grid;grid-template-columns:repeat(4,1fr);gap:clamp(20px,2.5vw,30px);margin-top:34px}
@media(max-width:840px){#ngl .steps{grid-template-columns:1fr 1fr}
}
@media(max-width:520px){#ngl .steps{grid-template-columns:1fr}
}
#ngl .step{border-top:1px solid rgba(255,255,255,.3);padding-top:18px}
#ngl .step .when{font-size:.66rem;letter-spacing:.24em;text-transform:uppercase;color:var(--gold-soft);margin-bottom:10px}
#ngl .step h3{color:var(--white)}
#ngl .step p{color:rgba(255,255,255,.8);font-size:.92rem}
#ngl details{border-bottom:1px solid var(--line)}
#ngl summary{cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center;gap:16px;font-family:var(--display);font-size:1.35rem;padding:20px 0;color:var(--ink)}
#ngl summary::-webkit-details-marker{display:none}
#ngl summary .plus{font-family:var(--display);color:var(--gold);font-size:1.7rem;line-height:1}
#ngl details .ans{padding:0 0 20px;font-size:.98rem;line-height:1.65;color:var(--ink-soft);max-width:70ch}
#ngl .closer{position:relative;min-height:66vh;display:flex;align-items:center;background:var(--olive-deep);color:var(--white)}
#ngl .closer .bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.5;mix-blend-mode:multiply}
#ngl .closer .tint{position:absolute;inset:0;background:linear-gradient(180deg,rgba(43,44,29,.3),rgba(43,44,29,.72))}
#ngl .closer .inner{position:relative;width:100%}
#ngl .closer h2{color:var(--white)}
#ngl .closer p{color:rgba(255,255,255,.9)}
</style>
