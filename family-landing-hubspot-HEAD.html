<!-- Nayara Gardens family landing :: paste into HubSpot landing-page Settings > Advanced options > 'Head HTML' -->
<link rel="preconnect" href="https://use.typekit.net" crossorigin>
<link rel="stylesheet" href="https://use.typekit.net/zft1qmm.css">
<style>
:root{
  --olive:#767342; --olive-2:#757342; --olive-deep:#33301c; --olive-ink:#2b2c1d;
  --cream:#edf2f2; --cream-2:#e3eaea; --ink:#2b2c1d; --ink-soft:rgba(43,44,29,.74); --ink-faint:rgba(43,44,29,.52);
  --gold:#e8a82c; --gold-soft:#e8a33d; --line:#d6dcdc; --white:#fff;
  --display:"minion-pro","Minion Pro",Georgia,"Times New Roman",serif;
  --body:"futura-pt","Futura PT","Century Gothic",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  --maxw:1200px; --gut:clamp(1.25rem,5vw,3.25rem);
}
#ngl *{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
#ngl{font-family:var(--body);color:var(--ink);background:var(--cream);line-height:1.75;font-weight:400;-webkit-font-smoothing:antialiased;overflow-x:hidden}
#ngl img{display:block;max-width:100%;height:auto}
#ngl a{color:inherit}
#ngl .wrap{max-width:var(--maxw);margin:0 auto;padding-inline:var(--gut)}
#ngl .narrow{max-width:780px}
#ngl section{padding:clamp(60px,9vw,132px) 0}
#ngl .rule{width:52px;height:1px;background:var(--gold);margin:0 0 22px}
#ngl .center .rule{margin-inline:auto}
#ngl .eyebrow{font-family:var(--body);font-weight:600;font-size:.7rem;letter-spacing:.36em;text-transform:uppercase;color:var(--gold);margin:0 0 16px}
#ngl h1,#ngl h2,#ngl h3{font-family:var(--display);font-weight:500;line-height:1.07;color:var(--ink);letter-spacing:.01em}
#ngl h2{font-size:clamp(2.1rem,4.4vw,3.4rem);margin:0 0 22px}
#ngl h3{font-size:clamp(1.3rem,2.1vw,1.6rem);margin:0 0 10px}
#ngl p{font-size:1.03rem;color:var(--ink-soft)}
#ngl .lede{font-family:var(--display);font-size:clamp(1.55rem,2.9vw,2.15rem);line-height:1.34;color:var(--ink);font-weight:400}
#ngl .btn{display:inline-block;padding:16px 38px;border-radius:1px;font-family:var(--body);font-weight:600;font-size:.74rem;letter-spacing:.22em;text-transform:uppercase;text-decoration:none;transition:transform .25s ease,background .25s ease,color .25s ease,box-shadow .25s ease}
#ngl .btn-solid{background:var(--gold);color:#2b2c1d;box-shadow:0 12px 32px -14px rgba(0,0,0,.45)}
#ngl .btn-solid:hover{transform:translateY(-2px);background:var(--gold-soft);box-shadow:0 18px 40px -16px rgba(0,0,0,.5)}
#ngl .btn-ghost{border:1px solid rgba(255,255,255,.75);color:#fff}
#ngl .btn-ghost:hover{background:#fff;color:var(--olive-ink)}
#ngl .btn-ghost-dark{border:1px solid var(--gold);color:var(--olive-ink)}
#ngl .btn-ghost-dark:hover{background:var(--gold);color:#2b2c1d}
/* hero */
#ngl .hero{position:relative;min-height:96vh;display:flex;align-items:flex-end;overflow:hidden}
#ngl .hero .bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scale(1.06);animation:nglZoom 16s ease-out forwards}
@keyframes nglZoom{to{transform:scale(1)}}
#ngl .hero .scrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(20,18,10,.34) 0%,rgba(20,18,10,.04) 36%,rgba(20,18,10,.40) 72%,rgba(20,18,10,.74) 100%)}
#ngl .hero .inner{position:relative;width:100%;padding-top:130px;padding-bottom:clamp(50px,7vw,98px)}
#ngl .hero .copy{color:#fff;max-width:50rem}
#ngl .hero .eyebrow{color:#fff;opacity:.92}
#ngl .hero h1{color:#fff;font-size:clamp(2.7rem,6.7vw,5.3rem);text-transform:uppercase;letter-spacing:.045em;line-height:1.0;max-width:16ch;text-shadow:0 2px 40px rgba(0,0,0,.35)}
#ngl .hero .sub{font-family:var(--display);font-style:italic;font-size:clamp(1.35rem,2.5vw,2rem);color:rgba(255,255,255,.95);margin:22px 0 32px;max-width:34ch}
#ngl .hero .cta-row{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
#ngl .hero .stats{display:flex;gap:clamp(22px,3vw,40px);flex-wrap:wrap;align-items:flex-start;margin-top:38px;padding-top:26px;border-top:1px solid rgba(255,255,255,.24)}
#ngl .hero .stat b{font-family:var(--display);font-size:1.2rem;color:#fff;font-weight:500;letter-spacing:.02em}
#ngl .hero .stat span{font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;display:block;color:rgba(255,255,255,.72);margin-top:4px}
/* sections */
#ngl .split{display:grid;grid-template-columns:1.02fr .98fr;gap:clamp(34px,5vw,80px);align-items:center}
@media(max-width:840px){#ngl .split{grid-template-columns:1fr}}
#ngl .media{position:relative}
#ngl .media img{border-radius:2px;box-shadow:0 40px 90px -46px rgba(43,44,29,.62);width:100%}
#ngl figcaption{margin-top:12px;font-size:.78rem;font-style:italic;color:var(--ink-faint)}
#ngl .mist{background:var(--cream-2)}
#ngl .center{text-align:center}
#ngl .center .eyebrow{display:block}
#ngl .center p{margin-inline:auto}
/* stat stripe */
#ngl .stripe-band{background:var(--olive-deep);color:#fff}
#ngl .stripe{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(24px,4vw,48px);text-align:center}
@media(max-width:620px){#ngl .stripe{grid-template-columns:1fr;gap:30px}}
#ngl .stripe .n{font-family:var(--display);font-size:clamp(2.3rem,4.4vw,3.2rem);color:var(--gold-soft);line-height:1;font-weight:500}
#ngl .stripe .l{font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.78);margin-top:12px}
/* pull quote */
#ngl .quote{background:var(--cream-2);text-align:center}
#ngl .quote .mark{font-family:var(--display);font-size:3rem;color:var(--gold);line-height:.5;display:block;margin-bottom:18px}
#ngl .quote p{font-family:var(--display);font-style:italic;font-size:clamp(1.65rem,3.3vw,2.5rem);line-height:1.36;color:var(--ink);max-width:24ch;margin:0 auto}
/* cards */
#ngl .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(22px,2.6vw,34px)}
@media(max-width:840px){#ngl .cards{grid-template-columns:1fr}}
#ngl .card{background:#fff;border-radius:3px;overflow:hidden;box-shadow:0 18px 50px -32px rgba(43,44,29,.5);transition:transform .35s ease,box-shadow .35s ease}
#ngl .card:hover{transform:translateY(-7px);box-shadow:0 34px 66px -30px rgba(43,44,29,.55)}
#ngl .card .ph{overflow:hidden;aspect-ratio:4/3}
#ngl .card .ph img{width:100%;height:100%;object-fit:cover;transition:transform .8s ease}
#ngl .card:hover .ph img{transform:scale(1.07)}
#ngl .card .cbody{padding:26px 26px 30px}
#ngl .card .ck{font-size:.64rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:9px}
#ngl .card p{font-size:.95rem}
/* day timeline */
#ngl .day{background:var(--olive-deep);color:#fff}
#ngl .day h2,#ngl .day .lede{color:#fff}
#ngl .day .eyebrow{color:var(--gold-soft)}
#ngl .steps{display:grid;grid-template-columns:repeat(4,1fr);gap:clamp(22px,2.5vw,32px);margin-top:40px}
@media(max-width:840px){#ngl .steps{grid-template-columns:1fr 1fr}}
@media(max-width:520px){#ngl .steps{grid-template-columns:1fr}}
#ngl .step{border-top:1px solid rgba(255,255,255,.3);padding-top:20px}
#ngl .step .num{font-family:var(--display);font-size:1.7rem;color:rgba(232,163,61,.55);line-height:1;margin-bottom:8px}
#ngl .step .when{font-size:.64rem;letter-spacing:.24em;text-transform:uppercase;color:var(--gold-soft);margin-bottom:8px}
#ngl .step h3{color:#fff;font-size:1.2rem}
#ngl .step p{color:rgba(255,255,255,.8);font-size:.92rem}
/* faq */
#ngl details{border-bottom:1px solid var(--line)}
#ngl details:first-of-type{border-top:1px solid var(--line)}
#ngl summary{cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center;gap:16px;font-family:var(--display);font-size:1.32rem;padding:22px 0;color:var(--ink);transition:color .2s ease}
#ngl summary:hover{color:var(--olive)}
#ngl summary::-webkit-details-marker{display:none}
#ngl summary .plus{font-family:var(--display);color:var(--gold);font-size:1.7rem;line-height:1;transition:transform .25s ease}
#ngl details[open] summary .plus{transform:rotate(45deg)}
#ngl details .ans{padding:0 0 22px;font-size:.98rem;line-height:1.7;color:var(--ink-soft);max-width:70ch}
/* closer */
#ngl .closer{position:relative;min-height:74vh;display:flex;align-items:center;overflow:hidden}
#ngl .closer .bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
#ngl .closer .scrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(20,18,10,.45),rgba(20,18,10,.72))}
#ngl .closer .inner{position:relative;width:100%;color:#fff}
#ngl .closer h2{color:#fff}
#ngl .closer p{color:rgba(255,255,255,.92)}
/* reveal */
#ngl.rv .reveal{opacity:0;transform:translateY(26px)}
#ngl.rv .reveal.in{opacity:1;transform:none;transition:opacity .85s ease,transform .85s ease}
@media(prefers-reduced-motion:reduce){#ngl.rv .reveal{opacity:1;transform:none}}
</style>
